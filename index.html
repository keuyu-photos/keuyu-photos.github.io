<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>keuyu photography</title>

<style>
body{
  margin:0;
  background:#fafafa;
  color:#111;
  font-family:Arial, Helvetica, sans-serif;
}

.cover{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  max-width:900px;
  margin:auto;
  padding:40px 24px;
}

h1{
  font-size:44px;
  letter-spacing:2px;
  margin:0 0 12px;
}

.subtitle{
  color:#777;
  font-size:18px;
}

.book{
  max-width:1000px;
  margin:auto;
  padding:0 24px;
}

.page{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:80px 0;
  box-sizing:border-box;
}

.page img{
  max-width:85%;
  max-height:82vh;
  width:auto;
  height:auto;
  display:block;
  border-radius:4px;
}

.two{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:32px;
}

.two img{
  max-width:100%;
  max-height:75vh;
}

.about{
  min-height:80vh;
  max-width:700px;
  margin:auto;
  padding:120px 24px;
  box-sizing:border-box;
}

.about p{
  color:#555;
  line-height:1.7;
}

footer{
  margin-top:80px;
  color:#888;
  font-size:12px;
}

@media(max-width:700px){
  h1{
    font-size:36px;
  }

  .page{
    min-height:85vh;
    padding:50px 0;
  }

  .page img{
    max-width:100%;
    max-height:75vh;
  }

  .two{
    grid-template-columns:1fr;
    gap:50px;
  }
}
</style>
</head>

<body>

<section class="cover">
  <h1>keuyu</h1>
  <div class="subtitle">Photography</div>
</section>

<main class="book">

  <section class="page">
    <img src="./A6700220.jpeg">
  </section>

  <section class="page">
    <img src="./A6700149.jpeg">
  </section>

  <section class="page">
    <img src="./A6700172.jpeg">
  </section>

  <section class="page">
    <img src="./A6700276.jpeg">
  </section>

  <section class="page">
    <img src="./A6700216.jpeg">
  </section>

  <section class="page">
    <img src="./DSC01130.jpeg">
  </section>

    <section class="page">
    <img src="./DSC01142.jpeg">
  </section>

    <section class="page">
    <img src="./DSC011190.jpeg">
  </section>

</main>

<section class="about">
  <h2>About</h2>
  <p>
    Photography by keuyu.<br>
    Travel, sea, and quiet moments. 
    Welcome to visit my IG: keuyu.photos
  </p>

  <footer>
    © keuyu
  </footer>
</section>

</body>
</html>
