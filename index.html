<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>keuyu photography</title>

<style>

body{
    margin:0;
    background:#fafafa;
    color:#111;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:40px;
}

h1{
    margin:0;
    font-size:48px;
}

.subtitle{
    color:#777;
    margin-top:10px;
}

.viewer{
    text-align:center;
    margin-top:40px;
}

.viewer img{
    max-width:70%;
    max-height:70vh;
    width:auto;
    height:auto;
}

.caption{
    margin-top:20px;
    color:#666;
    font-size:14px;
    line-height:1.6;
}

.controls{
    margin-top:30px;
    display:flex;
    justify-content:center;
    gap:20px;
}

button{
    padding:10px 20px;
    cursor:pointer;
}

.counter{
    margin-top:15px;
    color:#777;
}

.about{
    max-width:700px;
    margin:120px auto 80px auto;
    padding:0 40px;
    color:#555;
    line-height:1.8;
}

.about a{
    color:#111;
    text-decoration:none;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

    <h1>keuyu</h1>

    <div class="subtitle">
        Photography
    </div>

    <div class="viewer">

        <img id="photo"
        src="./images/Series/A6700216.jpeg">

        <div id="caption" class="caption">
            鳥居立在小島上，萬藍叢中一點紅，她不孤獨，有大海有藍天有白雲，還有風。
        </div>

        <div class="controls">

            <button onclick="previousPhoto()">
                ← Previous
            </button>

            <button onclick="nextPhoto()">
                Next →
            </button>

        </div>

        <div class="counter" id="counter">
            1 / 10
        </div>

    </div>

</div>

<section class="about">

    <p>
        A collection of travel, sea, and quiet moments.<br><br>

        Instagram:
        <a href="https://www.instagram.com/keuyu.photos"
        target="_blank">
            @keuyu.photos
        </a>
    </p>

</section>

<script>

const photos = [

{
image:"./images/Series/A6700216.jpeg",
caption:"The sea was quiet that morning."
},

{
image:"./images/Series/A6700078.jpeg",
caption:"Waiting for the next wave."
},

{
image:"./images/Series/A6700100.jpeg",
caption:"A short stop before sunset."
},

{
image:"./images/Series/A6700133.jpeg",
caption:"The sound of the sea remained."
},

{
image:"./images/Series/A6700149.jpeg",
caption:"A moment between departures."
},

{
image:"./images/Series/A6700172.jpeg",
caption:"The light faded slowly."
},

{
image:"./images/Series/A6700200.jpeg",
caption:"A quiet afternoon."
},

{
image:"./images/Series/A6700276.jpeg",
caption:"Looking towards the horizon."
},

{
image:"./images/Series/A6700284.jpeg",
caption:"The wind was stronger than it looked."
},

{
image:"./images/Series/A6700297.jpeg",
caption:"One last glance."
}

];

let current = 0;

const image =
document.getElementById("photo");

const caption =
document.getElementById("caption");

const counter =
document.getElementById("counter");

function updatePhoto(){

    image.src =
    photos[current].image;

    caption.innerHTML =
    photos[current].caption;

    counter.innerHTML =
    (current + 1)
    + " / "
    + photos.length;

}

function nextPhoto(){

    current++;

    if(current >= photos.length){

        current = 0;

    }

    updatePhoto();

}

function previousPhoto(){

    current--;

    if(current < 0){

        current =
        photos.length - 1;

    }

    updatePhoto();

}

</script>

</body>
</html>
