<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>keuyu photography</title>

<style>

body{
    margin:0;
    background:#ffffff;
    color:#111;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:60px 20px;
}

h1{
    font-size:42px;
    letter-spacing:2px;
    margin-bottom:10px;
}

.subtitle{
    color:#777;
    margin-bottom:60px;
}

.gallery{
    display:flex;
    flex-direction:column;
    gap:80px;
}

.gallery img{
    display:block;
    height:auto;
    border-radius:4px;
}

.large{
    width:75%;
    margin-left:auto;
    margin-right:auto;
}

.medium{
    width:55%;
    margin-left:0;
}

.small{
    width:40%;
    margin-left:auto;
}

.about{
    margin-top:120px;
    max-width:600px;
}

footer{
    margin-top:80px;
    color:#888;
    font-size:12px;
}

</style>
</head>

<body>

<div class="container">

    <h1>keuyu</h1>
    <div class="subtitle">Photography</div>

    <div class="gallery">

        <img class="large" src="./A6700220.jpeg">

        <img class="small" src="./A6700078.jpeg">

        <img class="medium" src="./A6700172.jpeg">

        <img class="large" src="./A6700276.jpeg">

    </div>

    <div class="about">

        <h2>About</h2>

        <p>
            Photography by keuyu.
            Travel, sea, and quiet moments.
        </p>

    </div>

    <footer>
        © keuyu
    </footer>

</div>

</body>
</html>
