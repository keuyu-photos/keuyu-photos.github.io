<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>keuyu photography</title>

<style>
body{
    margin:0;
    background:#fafafa;
    font-family:Arial, Helvetica, sans-serif;
    color:#111;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:40px;
}

h1{
    margin:0;
    font-size:48px;
}

.subtitle{
    color:#777;
    margin-top:10px;
}

.viewer{
    text-align:center;
    margin-top:40px;
}

.viewer img{
    max-width:70%;
    max-height:70vh;
    width:auto;
    height:auto;
}

.controls{
    margin-top:30px;
    display:flex;
    justify-content:center;
    gap:20px;
}

button{
    padding:10px 20px;
    cursor:pointer;
}

.counter{
    margin-top:15px;
    color:#777;
}

.about{
    max-width:700px;
    margin:120px auto 80px auto;
    padding:0 40px;
    color:#555;
    line-height:1.8;
}

.about h2{
    color:#111;
}

.about a{
    color:#111;
    text-decoration:none;
    font-weight:bold;
}

.about a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<div class="container">

    <h1>keuyu</h1>
    <div class="subtitle">Photography</div>

    <div class="viewer">

        <img id="photo" src="./images/Series/A6700078.jpeg">

        <div class="controls">
            <button onclick="previousPhoto()">← Previous</button>
            <button onclick="nextPhoto()">Next →</button>
        </div>

        <div class="counter" id="counter">1 / 10</div>

    </div>

</div>

<section class="about">

    <h2>About</h2>

    <p>
        A collection of travel, sea, and quiet moments.<br>
        Instagram:
        <a href="https://www.instagram.com/keuyu.photos" target="_blank">
            @keuyu.photos
        </a>
    </p>

    <footer>
    </footer>

</section>

<script>
const photos = [
    "./images/Series/A6700078.jpeg",
    "./images/Series/A6700100.jpeg",
    "./images/Series/A6700133.jpeg",
    "./images/Series/A6700149.jpeg",
    "./images/Series/A6700172.jpeg",
    "./images/Series/A6700200.jpeg",
    "./images/Series/A6700216.jpeg",
    "./images/Series/A6700276.jpeg",
    "./images/Series/A6700284.jpeg",
    "./images/Series/A6700297.jpeg"
];

let current = 0;

const image = document.getElementById("photo");
const counter = document.getElementById("counter");

function updatePhoto(){
    image.src = photos[current];
    counter.innerHTML = (current + 1) + " / " + photos.length;
}

function nextPhoto(){
    current++;
    if(current >= photos.length){
        current = 0;
    }
    updatePhoto();
}

function previousPhoto(){
    current--;
    if(current < 0){
        current = photos.length - 1;
    }
    updatePhoto();
}
</script>

</body>
</html>
