<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>keuyu photography</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111;
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 60px 20px;
    }

    h1 {
      font-size: 40px;
      letter-spacing: 2px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 40px;
    }

    .section {
      margin-top: 50px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }

    footer {
      margin-top: 80px;
      font-size: 12px;
      color: #888;
    }
  </style>
  .gallery{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  margin-top:50px;
}

.gallery img{
  object-fit:cover;
}

.large{
  width:100%;
}

.medium{
  width:65%;
}

.small{
  width:calc(50% - 10px);
}
</head>

<body>
  <div class="container">

    <h1>keuyu</h1>
    <div class="subtitle">Photography</div>
<img src="./A6700220.jpeg"
     style="max-width:800px; width:100%; margin-top:30px;">
    <img src="./A6700276.jpeg"
     style="max-width:800px; width:100%; margin-top:30px;">

    <div class="gallery">
  <img class="large" src="./A6700220.jpeg">
  <img class="small" src="./A6700078.jpeg">
  <img class="small" src="./A6700172.jpeg">
  <img class="medium" src="./A6700276.jpeg">
</div>

    <div class="section">
      <h2>About</h2>
      <p>
        Photography by keuyu.  
        Travel, sea, and quiet moments.
      </p>
    </div>

    <footer>
      © keuyu
    </footer>

  </div>
</body>
</html>
